<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">

      <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap');

        *{
          box-sizing:border-box;
          margin:0;
          padding:0;
        }

        .editor{
          width:680px;
          margin:10px auto;
          background:#0d1117;
          border:1px solid #30363d;
          border-radius:16px;
          overflow:hidden;
          font-family:'Fira Code',monospace;
          color:#c9d1d9;
          box-shadow:
            0 25px 60px rgba(0,0,0,.45),
            inset 0 1px 0 rgba(255,255,255,.03);
        }

        .titlebar{
          height:46px;
          background:#161b22;
          border-bottom:1px solid #30363d;
          display:flex;
          align-items:center;
          padding:0 16px;
        }

        .traffic{
          display:flex;
          gap:8px;
        }

        .dot{
          width:12px;
          height:12px;
          border-radius:50%;
        }

        .red{background:#ff5f56;}
        .yellow{background:#ffbd2e;}
        .green{background:#27c93f;}

        .tab{
          margin-left:18px;
          background:#0d1117;
          border:1px solid #30363d;
          border-bottom:none;
          color:#58a6ff;
          padding:8px 18px;
          border-radius:8px 8px 0 0;
          font-size:12px;
          font-weight:500;
        }

        .code{
          padding:18px 0;
          min-height:240px;
          background:
            linear-gradient(
              to right,
              #0d1117 0,
              #0d1117 60px,
              #11161d 60px,
              #11161d 61px,
              #0d1117 61px
            );
        }

        .line{
          display:flex;
          align-items:center;
          min-height:28px;
          padding-right:20px;
          opacity:0;
          transform:translateY(6px);
          animation:appear .55s forwards;
        }

        .line:hover{
          background:rgba(88,166,255,.06);
        }

        .ln{
          width:60px;
          text-align:right;
          color:#6e7681;
          padding-right:16px;
          user-select:none;
          flex-shrink:0;
        }

        .txt{
          white-space:pre;
        }

        .comment{
          color:#8b949e;
          font-style:italic;
        }

        .keyword{
          color:#ff7b72;
          font-weight:500;
        }

        .type{
          color:#79c0ff;
        }

        .string{
          color:#a5d6ff;
        }

        .func{
          color:#d2a8ff;
        }

        .number{
          color:#79c0ff;
        }

        .cursor{
          display:inline-block;
          width:8px;
          height:17px;
          margin-left:2px;
          background:#58a6ff;
          border-radius:1px;
          box-shadow:0 0 10px #58a6ff;
          animation:blink 1s infinite;
          vertical-align:-2px;
        }

        .status{
          height:30px;
          background:#161b22;
          border-top:1px solid #30363d;
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding:0 14px;
          font-size:11px;
          color:#8b949e;
        }

        @keyframes appear{
          to{
            opacity:1;
            transform:translateY(0);
          }
        }

        @keyframes blink{
          50%{
            opacity:0;
          }
        }
      </style>

      <div class="editor">

        <div class="titlebar">
          <div class="traffic">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>

          <div class="tab">
            Smart_AC_Final.ino
          </div>
        </div>

        <div class="code">

          <div class="line" style="animation-delay:.2s">
            <span class="ln">12</span>
            <span class="txt comment">// ==========================================</span>
          </div>

          <div class="line" style="animation-delay:.4s">
            <span class="ln">13</span>
            <span class="txt comment">// KONFIGURASI WIFI</span>
          </div>

          <div class="line" style="animation-delay:.6s">
            <span class="ln">14</span>
            <span class="txt comment">// ==========================================</span>
          </div>

          <div class="line" style="animation-delay:.9s">
            <span class="ln">15</span>
            <span class="txt">
              <span class="keyword">const</span>
              <span class="type">char</span>* ssid =
              <span class="string">"Home_Network_2.5Ghz"</span>;
            </span>
          </div>

          <div class="line" style="animation-delay:1.2s">
            <span class="ln">16</span>
            <span class="txt">
              <span class="keyword">const</span>
              <span class="type">char</span>* password =
              <span class="string">"SecretPass123"</span>;
              <span class="cursor"></span>
            </span>
          </div>

          <div class="line" style="animation-delay:1.6s">
            <span class="ln">17</span>
            <span class="txt">
              <span class="keyword">void</span>
              <span class="func">setup</span>() {
            </span>
          </div>

          <div class="line" style="animation-delay:1.9s">
            <span class="ln">18</span>
            <span class="txt">
              &nbsp;&nbsp;Serial.begin(<span class="number">115200</span>);
            </span>
          </div>

          <div class="line" style="animation-delay:2.2s">
            <span class="ln">19</span>
            <span class="txt">}</span>
          </div>

        </div>

        <div class="status">
          <span>Arduino Uno R4 WiFi | Line 16, Col 43</span>
          <span>UTF-8 | C++ | GitHub Dark</span>
        </div>

      </div>

    </div>
  </foreignObject>
</svg>

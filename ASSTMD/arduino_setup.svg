<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" fill="none">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
        .container {
          background: #0d1117;
          border: 1px solid #30363d;
          border-radius: 12px;
          font-family: 'Fira Code', monospace;
          color: #c9d1d9;
          overflow: hidden;
          box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .header { background: #161b22; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #30363d; }
        .dots { display: flex; gap: 8px; margin-right: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .tab { background: #0d1117; color: #58a6ff; font-size: 11px; padding: 6px 15px; border-radius: 5px 5px 0 0; border: 1px solid #30363d; border-bottom: none; }
        
        .code-area { padding: 20px; font-size: 13px; line-height: 1.6; position: relative; }
        .line { display: flex; opacity: 0; animation: fadeIn 0.5s forwards; white-space: pre; }
        .ln { color: #484f58; width: 30px; text-align: right; margin-right: 20px; user-select: none; }
        
        /* Penambahan margin-right agar const dan char ada jarak */
        .keyword { color: #ff7b72; margin-right: 8px; }
        .type { color: #79c0ff; }
        
        .string { color: #a5d6ff; }
        .comment { color: #8b949e; font-style: italic; }
        
        .cursor { display: inline-block; width: 8px; height: 15px; background: #58a6ff; margin-left: 2px; animation: blink 1s infinite; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0; } }
        
        .status-bar { background: #161b22; padding: 4px 15px; font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; border-top: 1px solid #30363d; }
      </style>
      <div class="container">
        <div class="header">
          <div class="dots">
            <div class="dot" style="background:#ff5f56"></div>
            <div class="dot" style="background:#ffbd2e"></div>
            <div class="dot" style="background:#27c93f"></div>
          </div>
          <div class="tab">Smart_AC_Final.ino</div>
        </div>
        <div class="code-area">
          <div class="line" style="animation-delay: 0.2s"><span class="ln">12</span><span class="comment">// ==========================================</span></div>
          <div class="line" style="animation-delay: 0.4s"><span class="ln">13</span><span class="comment">// KONFIGURASI WIFI</span></div>
          <div class="line" style="animation-delay: 0.6s"><span class="ln">14</span><span class="comment">// ==========================================</span></div>
          <div class="line" style="animation-delay: 1s"><span class="ln">15</span><span class="keyword">const</span><span class="type">char</span>* ssid = <span class="string">"Home_Network_5G"</span>;</div>
          <div class="line" style="animation-delay: 1.5s"><span class="ln">16</span><span class="keyword">const</span><span class="type">char</span>* password = <span class="string">"SecretPass123"</span>;<span class="cursor"></span></div>
        </div>
        <div class="status-bar">
          <span>Arduino Uno R4 WiFi | Line 16, Col 43</span>
          <span>UTF-8 | C++</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

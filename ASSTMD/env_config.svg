<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" fill="none">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
        .env-card {
          background: #010409;
          border: 1px dashed #30363d;
          border-radius: 8px;
          padding: 25px;
          font-family: 'Fira Code', monospace;
          box-shadow: inset 0 0 20px rgba(88, 166, 255, 0.05);
        }
        .label { color: #8b949e; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .key { color: #ffa657; font-weight: 600; font-size: 14px; }
        .val-box { background: #161b22; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #30363d; display: flex; align-items: center; overflow: hidden;}
        
        .mask-anim {
          height: 14px;
          background: linear-gradient(90deg, #30363d 25%, #484f58 50%, #30363d 75%);
          background-size: 200% 100%;
          animation: loading 1.5s infinite;
          border-radius: 3px;
        }
        
        @keyframes loading { to { background-position: -200% 0; } }
        @keyframes reveal { from { width: 0; opacity: 0; } to { width: 100%; opacity: 1; } }
        
        .real-value { color: #7ee787; font-size: 13px; animation: reveal 1s 2s both; white-space: nowrap; overflow: hidden; }
        .hidden-at-start { animation: hideMask 0.1s 2s forwards; }
        @keyframes hideMask { to { display: none; width: 0; height: 0; padding: 0; } }
      </style>
      <div class="env-card">
        <span class="label"># Google AI Studio (Gemini)</span>
        <div class="val-box">
          <span class="key">GEMINI_API_KEY=</span>
          <div class="mask-anim hidden-at-start" style="width: 250px; margin-left: 10px;"></div>
          <span class="real-value" style="margin-left: 10px;">"AIzaSyB-XXXXXXXXXXXXXXXXXXXXX"</span>
        </div>
        
        <span class="label"># Arduino Serial Monitor</span>
        <div class="val-box">
          <span class="key">ARDUINO_IP=</span>
          <div class="mask-anim hidden-at-start" style="width: 120px; margin-left: 10px;"></div>
          <span class="real-value" style="margin-left: 10px;">"192.168.1.100"</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
